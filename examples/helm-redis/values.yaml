architecture: standalone

sentinel:
  enabled: false

auth:
  enabled: true
  password: "{{ password }}"

master:
  resources:
    limits:
      memory: "{{ memory_limit }}"
  persistence:
    enabled: false

replica:
  replicaCount: {{ replica_count }}
  resources:
    limits:
      memory: "{{ memory_limit }}"
  persistence:
    enabled: false
