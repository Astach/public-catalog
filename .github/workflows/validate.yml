name: Validate Blueprints

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["**/[0-9]*.[0-9]*.[0-9]*"]   # e.g. aws/s3/1.0.0

jobs:
  validate-qbm:
    name: Validate QBM manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Install tools
        run: pip install pyyaml

      - name: Validate QBM structure
        run: |
          for qbm in $(find examples -name 'qbm.yml' -type f); do
            echo "Validating $qbm..."

            python3 -c "
          import yaml, sys

          with open('$qbm') as f:
              doc = yaml.safe_load(f)

          errors = []

          # Required top-level fields
          for field in ['apiVersion', 'kind', 'metadata', 'spec']:
              if field not in doc:
                  errors.append(f'Missing required field: {field}')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)

          meta = doc.get('metadata', {})
          for field in ['name', 'version']:
              if field not in meta:
                  errors.append(f'Missing metadata.{field}')

          spec = doc.get('spec', {})
          kind = doc.get('kind', 'ServiceBlueprint')

          # StackBlueprints have different validation
          if kind == 'StackBlueprint':
              if 'stages' not in spec:
                  errors.append('spec.stages is required for StackBlueprint')
          else:
              engine = spec.get('engine')
              if engine not in ('terraform', 'opentofu', 'helm'):
                  errors.append(f'spec.engine must be terraform, opentofu, or helm (got: {engine})')

              if engine in ('terraform', 'opentofu') and 'provider' not in spec:
                  errors.append(f'spec.provider is required when engine is {engine}')

              if engine == 'helm' and 'chart' not in spec:
                  errors.append('spec.chart is required when engine is helm')

          # Validate validValues on variables
          all_vars = spec.get('variables', []) or []
          var_names = [v['name'] for v in all_vars]

          for var in all_vars:
              vv = var.get('validValues')
              if vv is not None:
                  if not isinstance(vv, list):
                      errors.append(f\"Variable '{var['name']}' validValues must be a list\")
                  elif 'default' in var and var['default'] not in vv:
                      errors.append(f\"Variable '{var['name']}' default '{var['default']}' is not in validValues {vv}\")

          # Validate serviceVersionVar points to an actual variable
          svv = meta.get('serviceVersionVar')
          if svv is not None:
              if svv not in var_names:
                  errors.append(f\"metadata.serviceVersionVar '{svv}' does not match any variable in spec.variables (found: {var_names})\")

          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)

          print(f'OK: $qbm')
          "
          done

      - name: Validate variables exist in TF files (terraform blueprints)
        run: |
          for qbm in $(find examples -name 'qbm.yml' -type f); do
            dir=$(dirname "$qbm")

            python3 -c "
          import yaml, re, sys, glob

          with open('$qbm') as f:
              doc = yaml.safe_load(f)

          engine = doc.get('spec', {}).get('engine')
          if engine not in ('terraform', 'opentofu'):
              print(f'SKIP: $qbm (engine={engine}, not terraform)')
              sys.exit(0)

          # Check variables.tf exists
          vars_file = '$dir/variables.tf'
          try:
              with open(vars_file) as f:
                  tf_content = f.read()
          except FileNotFoundError:
              print(f'ERROR: {vars_file} not found')
              sys.exit(1)

          tf_vars = set(re.findall(r'variable\s+\"(\w+)\"', tf_content))

          errors = []
          for var in doc['spec'].get('contextVariables', []):
              if var['name'] not in tf_vars:
                  errors.append(f\"contextVariable '{var['name']}' not found in {vars_file}\")

          for var in doc['spec'].get('variables', []):
              if var['name'] not in tf_vars:
                  errors.append(f\"variable '{var['name']}' not found in {vars_file}\")

          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)

          print(f'OK: All variables in $qbm exist in {vars_file}')
          "
          done

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        blueprint:
          - examples/aws-s3
          - examples/aws-rds-postgresql
          - examples/qovery-container
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform init & validate
        working-directory: ${{ matrix.blueprint }}
        run: |
          terraform init -backend=false
          terraform validate

  generate-catalog:
    name: Generate catalog.json
    runs-on: ubuntu-latest
    needs: [validate-qbm, validate-terraform]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git tags

      - name: Install tools
        run: pip install pyyaml

      - name: Generate catalog.json
        run: python3 scripts/generate-catalog.py --output catalog.json

      - name: Commit catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          if git diff --cached --quiet; then
            echo "catalog.json is up to date"
          else
            git commit -m "Update catalog.json [skip ci]"
            git push
          fi
