apiVersion: "qovery.com/v2"
kind: ServiceBlueprint

metadata:
  name: "helm-redis"
  version: "1.0.0"
  description: "Redis cache via Bitnami Helm chart"
  icon: "https://cdn.qovery.com/icons/redis.svg"
  serviceFamily: "redis"
  serviceVersionVar: "redis_version"
  categories:
    - "cache"
    - "redis"

spec:
  engine: helm

  chart:
    repository: "https://charts.bitnami.com/bitnami"
    name: "redis"
    version: "25.3.11"

  arguments: []
  allowClusterWideResources: false

  contextVariables:
    - name: "namespace"
      source: "cluster.namespace"

  variables:
    - name: "redis_version"
      type: "string"
      required: false
      default: "7.4"
      description: "Redis version"
      validValues: ["7.2", "7.4"]
    - name: "replica_count"
      type: "number"
      required: false
      default: "1"
      description: "Number of Redis replicas"
    - name: "memory_limit"
      type: "string"
      required: false
      default: "256Mi"
      description: "Memory limit for Redis pods"
    - name: "password"
      type: "string"
      required: true
      description: "Redis authentication password"

  outputs:
    - name: "redis_host"
      description: "Redis service hostname"
      sensitive: false
    - name: "redis_port"
      description: "Redis service port"
      sensitive: false
